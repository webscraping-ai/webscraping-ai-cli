name: Release

# Publishes to npm when a GitHub Release is published. Uses npm trusted
# publishing (OIDC) — no NPM_TOKEN in repo secrets.
#
# One-time setup:
#   - npmjs.com → webscraping-ai-cli → Settings → Trusted Publishers →
#     add GitHub Actions:
#       Organization or user: webscraping-ai
#       Repository:           webscraping-ai-cli
#       Workflow filename:    release.yml
#       Environment:          npm
#   - GitHub repo → Settings → Environments → create environment "npm"
#     (matches MCP / n8n pattern). Add reviewers there if you want an
#     approval gate before publish.
#
# Release flow:
#   1. Bump version in package.json, commit, push.
#   2. Create a GitHub Release with tag vX.Y.Z (matching package.json).
#   3. This workflow verifies the tag, builds, tests, and publishes.
#
# Gotchas (debugged on MCP — same traps apply here):
#   - For `release: published`, GitHub uses the workflow file from the tag's
#     commit, not master HEAD. If you push a workflow fix after tagging,
#     move the tag forward (or cut a new tag) for the fix to take effect.
#   - Don't pass `registry-url` to setup-node when using OIDC. It would
#     write an .npmrc with `_authToken=${NODE_AUTH_TOKEN}` (empty), which
#     npm sends as a failed auth attempt — 404 result instead of OIDC.
#   - OIDC trusted publishing needs npm 11.5.1+. Node 20 ships with npm 10,
#     which errors ENEEDAUTH instead of doing the OIDC handshake — hence
#     the explicit `npm install -g npm@latest`.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required for npm provenance and trusted publishing

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          echo "Tag (stripped): $TAG"
          echo "package.json:   $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
